name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: # permite probar la compilación sin publicar

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Sin esto, cada runner genera un debug.keystore distinto y las
      # actualizaciones entre releases fallan con "aplicación no instalada".
      - name: Clave de firma estable
        env:
          KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            mkdir -p ~/.android
            echo "$KEYSTORE_B64" | base64 -d > ~/.android/debug.keystore
          fi

      - name: Compilar APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Renombrar APK con la versión
        run: cp app/build/outputs/apk/debug/app-debug.apk "privatemusic-${GITHUB_REF_NAME#v}.apk"

      - name: Publicar release con el APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: privatemusic-*.apk
          generate_release_notes: true
