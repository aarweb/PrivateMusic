name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: # permite probar la compilación sin publicar

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Sin esto, cada runner genera un debug.keystore distinto y las
      # actualizaciones entre releases fallan con "aplicación no instalada".
      - name: Clave de firma estable
        env:
          KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::Falta el secret DEBUG_KEYSTORE_B64: sin él la release saldría con una firma distinta y las actualizaciones fallarían."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/debug.keystore"
          echo "PM_KEYSTORE=$RUNNER_TEMP/debug.keystore" >> "$GITHUB_ENV"

      - name: Compilar APK
        env:
          ACOUSTID_KEY: ${{ secrets.ACOUSTID_KEY }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Comprobar firma
        run: |
          BT=$(ls "$ANDROID_HOME/build-tools" | tail -1)
          DIGEST=$("$ANDROID_HOME/build-tools/$BT/apksigner" verify --print-certs \
            app/build/outputs/apk/debug/app-debug.apk | grep -oE "SHA-256 digest: [0-9a-f]+" | head -1 | awk '{print $3}')
          EXPECTED="e1fefae098e1bbab44660dc2527184ea3bbc6dac1d524eaf75b86669dc0b8ed4"
          echo "firma: $DIGEST"
          if [ "$DIGEST" != "$EXPECTED" ]; then
            echo "::error::El APK NO está firmado con la clave estable (esperado $EXPECTED)."
            exit 1
          fi

      - name: Renombrar APK con la versión
        run: cp app/build/outputs/apk/debug/app-debug.apk "privatemusic-${GITHUB_REF_NAME#v}.apk"

      - name: Publicar release con el APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: privatemusic-*.apk
          generate_release_notes: true
