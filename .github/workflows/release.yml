name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: # permite probar la compilación sin publicar

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Sin esto, cada runner genera un debug.keystore distinto y las
      # actualizaciones entre releases fallan con "aplicación no instalada".
      - name: Clave de firma estable
        env:
          KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::Falta el secret DEBUG_KEYSTORE_B64: sin él la release saldría con una firma distinta y las actualizaciones fallarían."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/debug.keystore"
          echo "PM_KEYSTORE=$RUNNER_TEMP/debug.keystore" >> "$GITHUB_ENV"

      # Se publicaba el APK de depuración. Un APK `debuggable` corre con ART en
      # modo depuración: en el Pixel 10 Pro, el 6% de los fotogramas llegaban
      # tarde al desplazar la biblioteca, contra el 1% de este. Firma idéntica,
      # así que se instala encima de las versiones anteriores.
      - name: Compilar APK
        env:
          ACOUSTID_KEY: ${{ secrets.ACOUSTID_KEY }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Comprobar firma
        run: |
          BT=$(ls "$ANDROID_HOME/build-tools" | tail -1)
          DIGEST=$("$ANDROID_HOME/build-tools/$BT/apksigner" verify --print-certs \
            app/build/outputs/apk/release/app-release.apk | grep -oE "SHA-256 digest: [0-9a-f]+" | head -1 | awk '{print $3}')
          EXPECTED="e1fefae098e1bbab44660dc2527184ea3bbc6dac1d524eaf75b86669dc0b8ed4"
          echo "firma: $DIGEST"
          if [ "$DIGEST" != "$EXPECTED" ]; then
            echo "::error::El APK NO está firmado con la clave estable (esperado $EXPECTED)."
            exit 1
          fi

      - name: Renombrar APK con la versión
        run: cp app/build/outputs/apk/release/app-release.apk "privatemusic-${GITHUB_REF_NAME#v}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: privatemusic-*.apk

  # El esquema compartido es el mismo fichero para el móvil y el PC: si una
  # migración se rompe, se entera aquí antes de publicar nada.
  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: ./gradlew :core:jvmTest --no-daemon

  desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Versión desde la etiqueta
        run: |
          V="${GITHUB_REF_NAME#v}"
          case "$V" in ''|*[!0-9.]*) V=1.0.0 ;; esac
          echo "PM_VERSION=$V" >> "$GITHUB_ENV"

      # Imagen portable con su propia JVM: es lo único que sirve fuera de
      # Debian/Ubuntu (Arch, Fedora, …), y es lo que sabe auto-actualizarse.
      - name: Imagen portable
        run: |
          ./gradlew :desktop:createDistributable -PdesktopVersion="$PM_VERSION" --no-daemon
          tar -czf "privatemusic-desktop-$PM_VERSION-linux-x64.tar.gz" \
            -C desktop/build/compose/binaries/main/app PrivateMusic

      - name: Paquete .deb
        run: |
          ./gradlew :desktop:packageDeb -PdesktopVersion="$PM_VERSION" --no-daemon
          cp desktop/build/compose/binaries/main/deb/*.deb "privatemusic-desktop-$PM_VERSION.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            privatemusic-desktop-*-linux-x64.tar.gz
            privatemusic-desktop-*.deb

  desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Versión desde la etiqueta
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          case "$V" in ''|*[!0-9.]*) V=1.0.0 ;; esac
          echo "PM_VERSION=$V" >> "$GITHUB_ENV"

      # No hay compilación cruzada: el .msi sólo sale de un runner de Windows.
      - name: Instalador .msi
        shell: bash
        run: |
          ./gradlew :desktop:packageMsi -PdesktopVersion="$PM_VERSION" --no-daemon
          cp desktop/build/compose/binaries/main/msi/*.msi "privatemusic-desktop-$PM_VERSION.msi"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: privatemusic-desktop-*.msi

  publicar:
    needs: [android, test-core, desktop-linux, desktop-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publicar release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            privatemusic-*.apk
            privatemusic-desktop-*
          generate_release_notes: true
